  /* ===== Clean Queen: Hot Pink + White + Black Text ===== */
  :root{
    --pink: #ff2bbf;
    --pink-soft: #ffd6ee;
    --ink: #000000;
    --white: #ffffff;
  }

  body{
    margin: 0;
    min-height: 100vh;
    background: var(--white);
    color: var(--ink);
    font-family: Arial, sans-serif;
  }

  /* Header + hero */
  .header,
  .hero{
    background: linear-gradient(135deg, var(--pink) 0%, var(--pink-soft) 100%);
    color: var(--ink);
  }

  /* Header layout */
  .header .wrap{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  /* Logo + bubbles */
  .logo{
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.7rem;
    font-weight: 900;
    letter-spacing: 0.6px;
  }

  .bubbles{
    width: 36px;
    height: 36px;
    border-radius: 12px;
    background:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,.95) 0 6px, transparent 7px),
      radial-gradient(circle at 60% 40%, rgba(255,255,255,.75) 0 9px, transparent 10px),
      radial-gradient(circle at 70% 75%, rgba(255,255,255,.85) 0 7px, transparent 8px);
    outline: 2px solid rgba(0,0,0,.08);
    box-shadow: 0 8px 18px rgba(255,43,191,.22);
    flex: 0 0 auto;
  }

  /* Navigation */
  .nav a{
    color: var(--ink);
    text-decoration: none;
    font-weight: 600;
    padding: 8px 10px;
    border-radius: 999px;
  }

  .nav a:hover{
    background: rgba(255,255,255,.55);
  }

  /* Cards / sections stay white */
  .card,
  section,
  .section,
  .cards,
  .pricing{
    background: var(--white);
    color: var(--ink);
  }

  /* Buttons */
  .button{
    background: var(--pink);
    color: var(--ink);
    border-radius: 999px;
    font-weight: 800;
    padding: 12px 20px;
  }

  .button.alt{
    background: var(--white);
    border: 2px solid var(--pink);
    color: var(--ink);
  }


/* FORCE REMOVE FOOTER CROWN (CSS-INJECTED) */
.footer .logo::before,
.footer .logo::after {
  content: none !important;
  display: none !important;
}

.footer .logo {
  background-image: none !important;
}


/* ABSOLUTELY REMOVE ANY ICONS INSIDE FOOTER LOGO */
.footer .logo i,
.footer .logo svg,
.footer .logo img {
  display: none !important;
}

/* If the crown is a text/emoji node, hide the first child */
.footer .logo > :first-child:not(.bubbles) {
  display: none !important;
}

/* FINAL FOOTER CROWN KILL — hide all text except bubbles + name */
.footer .logo {
  font-size: 0 !important;
}

.footer .logo .bubbles,
.footer .logo div {
  font-size: 1.7rem !important;
}

/* ===== POLISH PATCH: black text, softer background, subtle hover ===== */

/* 1) FORCE "PURPLE" TEXT TO BLACK (common accent selectors) */
.badge,
.badges .badge,
.price strong,
.small,
.section h2,
.card h3,
a,
a:visited {
  color: var(--ink) !important;
}

/* If any elements are explicitly styled with purple-ish accent variables */
[class*="purple"],
[style*="purple"],
[style*="#7"],
[style*="#8"],
[style*="#9"] {
  color: var(--ink) !important;
}

/* 2) SOFTEN THE HEADER/HERO BACKGROUND */
.header,
.hero {
  background: linear-gradient(
    135deg,
    #ff55c8 0%,
    #ffe6f3 55%,
    #ffffff 100%
  ) !important;
}

/* Optional: give the page a soft, clean glow (very subtle) */
body {
  background:
    radial-gradient(900px 500px at 15% 0%, rgba(255, 85, 200, 0.12), transparent 60%),
    radial-gradient(700px 450px at 90% 10%, rgba(255, 85, 200, 0.10), transparent 55%),
    #ffffff !important;
}

/* 3) SUBTLE HOVER EFFECTS */
.nav a {
  transition: background-color .18s ease, transform .18s ease;
}
.nav a:hover {
  background: rgba(255,255,255,.65) !important;
  transform: translateY(-1px);
}

/* Buttons: small lift + soft shadow */
.button,
.button.alt {
  transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
}
.button:hover,
.button.alt:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 22px rgba(0,0,0,.10);
  filter: brightness(1.02);
}

/* Cards: gentle lift so it feels clickable/polished */
.card {
  transition: transform .18s ease, box-shadow .18s ease;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 14px 30px rgba(0,0,0,.10);
}

/* Respect people who prefer reduced motion */
@media (prefers-reduced-motion: reduce) {
  .nav a,
  .button,
  .button.alt,
  .card {
    transition: none !important;
  }
}
